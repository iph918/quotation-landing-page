<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quotation</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f8f8f8;
    color:#13294B;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:0 32px;
}

nav{
    height:90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e5e5e5;
    background:white;
}

.logo{
    font-family:'Sora',sans-serif;
    font-size:28px;
    font-weight:800;
}

.btn{
    background:#ff7a00;
    color:white;
    padding:14px 24px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
}

.hero{
    padding:120px 0;
    text-align:center;
}

.hero h1{
    font-family:'Sora',sans-serif;
    font-size:72px;
    line-height:1.1;
    margin-bottom:24px;
}

.hero p{
    max-width:700px;
    margin:auto;
    font-size:22px;
    color:#555;
}

.accurate{
    background:white;
    padding:120px 20px;
    text-align:center;
}

.accurate h2{
    font-family:'Sora',sans-serif;
    font-size:64px;
    margin-bottom:20px;
}

.accurate p{
    font-size:24px;
    color:#666;
}

footer{
    padding:80px 20px;
    text-align:center;
    color:#777;
}

</style>
</head>

<body>

<nav>
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;width:100%;">
        <div class="logo">QUOTATION</div>
        <a href="#" class="btn">Request Early Access</a>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1>Instant Window Quotes<br>From Job-Site Photos</h1>

        <p>
            Generate accurate, customized quotes in minutes
            so you can close more jobs while the customer
            is still interested.
        </p>
    </div>
</section>

<section class="accurate">
    <div class="container">
        <h2>The Price Is Accurate.</h2>

        <p>
            Reliable pricing is the foundation of the entire platform.
        </p>
    </div>
</section>

<footer>
    © 2026 Quotation
</footer>

</body>
</html>
